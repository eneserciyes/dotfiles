
set -a terminal-features "tmux-256color:rgb"
set -g prefix C-SPACE
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right ""
set -g status-left "#S"
set -g status-interval 5
set -g focus-events on

bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind p run "tmux display-popup -E -w 60% -h 60% -d ~ zsh"
bind b set -g status
bind G run "~/.config/scripts/open-github.sh"
bind D run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind N run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~/ws/notes"
bind P run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~/ws/ari-pilot"
bind S run "tmux neww ~/.config/scripts/ssh-dispensary.sh"
bind g neww -n "lazygit" lazygit
bind E show-environment -g
bind t run "tmux neww ~/.config/scripts/time.sh"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi Enter send -X copy-selection
bind r source-file "~/.config/tmux/tmux.conf"
