
set -a terminal-features "tmux-256color:rgb"
set -g prefix C-SPACE
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right ""
set -g status-left "#S"
set -g status-interval 5

bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind b set -g status
bind G run "~/.config/scripts/open-github.sh"
bind D run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind H run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~"
bind P run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~/ws/ari-pilot"
bind g neww -n "lazygit" lazygit
bind E show-environment -g
bind t run "tmux neww ~/.config/scripts/time.sh"
bind r source-file "~/.config/tmux/tmux.conf"
