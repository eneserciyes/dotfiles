
set -a terminal-features "tmux-256color:rgb"
set -g prefix C-SPACE
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right ""
set -g status-left "#S"

bind f run-shell "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind g run-shell "~/.config/scripts/open-github.sh"
bind D run-shell "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind H run-shell "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~"
bind P run-shell "tmux neww ~/.config/scripts/tmux-session-dispensary.sh ~/ws/ari-pilot"
bind r source-file "~/.config/tmux/tmux.conf"
